<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>KMT inc. TKM Support業務用システム</title>

  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --main: #1f2937;
      --main-soft: #374151;
      --accent: #2563eb;
      --danger: #dc2626;
      --warning: #f59e0b;
      --success: #16a34a;
      --radius: 18px;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: 48px;
    }

    .header {
      background: linear-gradient(135deg, #111827, #374151);
      color: #fff;
      border-radius: 0 0 24px 24px;
      padding: 20px 16px 24px;
      margin: 0 -16px 16px;
      box-shadow: var(--shadow);
    }

    .header-title {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.35;
      margin: 0 0 4px;
    }

    .header-subtitle {
      font-size: 13px;
      opacity: 0.85;
      margin: 0;
    }

    .user-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      font-size: 13px;
      opacity: 0.95;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 14px;
      border: 1px solid rgba(229, 231, 235, 0.8);
    }

    .card-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 12px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 800;
      margin: 22px 0 8px;
      padding-left: 10px;
      border-left: 4px solid var(--main);
      color: var(--main);
    }

    .label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--main);
      margin: 12px 0 6px;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .textarea {
      min-height: 92px;
      resize: vertical;
    }

    .input:focus,
    .select:focus,
    .textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 13px 14px;
      font-weight: 800;
      background: var(--main);
      color: #fff;
      margin-top: 10px;
    }

    .btn:hover {
      background: var(--main-soft);
    }

    .btn.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn.blue {
      background: var(--accent);
    }

    .btn.danger {
      background: var(--danger);
    }

    .btn.success {
      background: var(--success);
    }

    .btn.warning {
      background: var(--warning);
      color: #111827;
    }

    .btn.small {
      width: auto;
      padding: 8px 12px;
      font-size: 13px;
      margin-top: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .menu-button {
      min-height: 96px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      box-shadow: var(--shadow);
      padding: 14px;
      text-align: left;
    }

    .menu-button strong {
      display: block;
      font-size: 16px;
      margin-bottom: 6px;
    }

    .menu-button span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .menu-button.disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .form-grid .full {
      grid-column: 1 / -1;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .list-card {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
    }

    .list-card-title {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .list-card-meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      background: #f3f4f6;
      color: #374151;
      font-size: 12px;
      font-weight: 700;
    }

    .badge.blue {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .badge.green {
      background: #dcfce7;
      color: #15803d;
    }

    .badge.orange {
      background: #ffedd5;
      color: #c2410c;
    }

    .badge.red {
      background: #fee2e2;
      color: #b91c1c;
    }

    .badge.purple {
      background: #ede9fe;
      color: #6d28d9;
    }

    .detail-row {
      border-bottom: 1px solid var(--line);
      padding: 10px 0;
    }

    .detail-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 15px;
      font-weight: 700;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .top-actions .btn {
      margin-top: 0;
    }

    .message {
      display: none;
      padding: 12px;
      border-radius: 14px;
      margin-bottom: 12px;
      font-size: 14px;
      font-weight: 700;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: #dcfce7;
      color: #166534;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .message.info {
      background: #dbeafe;
      color: #1e40af;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      margin-top: 24px;
    }

    .hidden {
      display: none !important;
    }

    .loading {
      opacity: 0.65;
      pointer-events: none;
    }

    .log-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fff;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .log-card strong {
      display: block;
      margin-bottom: 4px;
    }

    .shift-header-box {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }

    .shift-title {
      font-size: 20px;
      font-weight: 900;
      margin: 0 0 6px;
    }

    .shift-range {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .shift-month-nav {
      display: flex;
      gap: 8px;
      margin: 12px 0;
    }

    .shift-month-nav .btn {
      margin-top: 0;
    }

    .shift-calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 4px;
    }

    .shift-weekday {
      text-align: center;
      font-size: 12px;
      font-weight: 800;
      color: #374151;
      padding: 8px 0;
    }

    .shift-day {
      min-height: 86px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 6px;
      font-size: 12px;
      overflow: hidden;
    }

    .shift-day.empty {
      background: transparent;
      border: none;
    }

    .shift-date {
      font-weight: 900;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .shift-date.sunday {
      color: #dc2626;
    }

    .shift-date.saturday {
      color: #2563eb;
    }

    .shift-worker {
      display: block;
      background: #f3f4f6;
      border-radius: 7px;
      padding: 3px 5px;
      margin-bottom: 3px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .shift-worker.special {
      background: #fef3c7;
      color: #92400e;
    }

    .shift-special-list {
      margin-top: 14px;
    }

    .shift-special-item {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .shift-special-item strong {
      display: block;
      margin-bottom: 4px;
    }

    @media (max-width: 520px) {
      .app {
        padding: 12px;
      }

      .header {
        margin: 0 -12px 14px;
        padding: 18px 14px 22px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .filter-grid {
        grid-template-columns: 1fr;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .top-actions {
        flex-direction: column;
      }

      .btn.small {
        width: 100%;
      }

      .shift-calendar {
        gap: 3px;
      }

      .shift-day {
        min-height: 78px;
        padding: 4px;
        border-radius: 8px;
      }

      .shift-worker {
        font-size: 10px;
        padding: 2px 4px;
      }

      .shift-month-nav {
        flex-direction: row;
      }

      .shift-month-nav .btn {
        width: 33.3%;
        font-size: 12px;
        padding: 10px 6px;
      }
    }
  </style>
</head>

<body>
  <div class="app" id="app">
    <header class="header">
      <h1 class="header-title">
        KMT inc. TKM Support業務用システム
      </h1>
      <p class="header-subtitle">
        TKM Support Parts Management System
      </p>

      <div class="user-bar" id="userBar" style="display:none;">
        <span id="loginUserText"></span>
        <button class="btn small secondary" onclick="logout()">ログアウト</button>
      </div>
    </header>

    <div id="message" class="message"></div>

    <!-- ログイン画面 -->
    <section id="pageLogin" class="page active">
      <div class="card">
        <h2 class="card-title">ログイン</h2>

        <label class="label" for="loginUserId">ユーザーID</label>
        <input id="loginUserId" class="input" type="text" autocomplete="username" placeholder="例：wakasa" />

        <label class="label" for="loginPassword">パスワード</label>
        <input id="loginPassword" class="input" type="password" autocomplete="current-password" placeholder="パスワード" />

        <button class="btn blue" onclick="login()">ログイン</button>
      </div>
    </section>

    <!-- ホーム画面 -->
    <section id="pageHome" class="page">
      <div class="card">
        <h2 class="card-title">メニュー</h2>

        <div class="grid">
          <button class="menu-button" onclick="openSearchPage()">
            <strong>仮置き場検索</strong>
            <span>建屋・区分・キーワードで仮置き場を検索します。</span>
          </button>

          <button class="menu-button" onclick="openCreateForm()">
            <strong>仮置き場登録</strong>
            <span>新しい仮置き場を登録します。</span>
          </button>

          <button class="menu-button" onclick="openShiftPage()">
            <strong>シフト確認</strong>
            <span>TKMサポートメンバーのシフトをカレンダー形式で確認します。</span>
          </button>

          <button class="menu-button" onclick="openLogPage()">
            <strong>操作履歴</strong>
            <span>登録・更新・削除などの操作履歴を確認します。</span>
          </button>

          <button class="menu-button disabled" onclick="showInfo('在庫管理は次回以降に追加予定です。')">
            <strong>在庫管理</strong>
            <span>準備中</span>
          </button>

          <button class="menu-button disabled" onclick="showInfo('FRAT管理は次回以降に追加予定です。')">
            <strong>FRAT管理</strong>
            <span>準備中</span>
          </button>

          <button class="menu-button disabled" onclick="showInfo('KIT管理は次回以降に追加予定です。')">
            <strong>KIT管理</strong>
            <span>準備中</span>
          </button>
        </div>
      </div>
    </section>

    <!-- 仮置き場検索画面 -->
    <section id="pageSearch" class="page">
      <div class="top-actions">
        <button class="btn small secondary" onclick="showPage('pageHome')">← ホーム</button>
        <button class="btn small blue" onclick="openCreateForm()">＋ 新規登録</button>
      </div>

      <div class="card">
        <h2 class="card-title">仮置き場検索</h2>

        <div class="filter-grid">
          <div>
            <label class="label" for="filterBuilding">建屋</label>
            <select id="filterBuilding" class="select"></select>
          </div>

          <div>
            <label class="label" for="filterFloor">フロア</label>
            <input id="filterFloor" class="input" type="text" placeholder="例：2F" />
          </div>

          <div>
            <label class="label" for="filterCategory">区分</label>
            <select id="filterCategory" class="select"></select>
          </div>

          <div>
            <label class="label" for="filterCategory2">区分2</label>
            <select id="filterCategory2" class="select"></select>
          </div>

          <div>
            <label class="label" for="filterMaintenanceType">メンテ区分</label>
            <select id="filterMaintenanceType" class="select"></select>
          </div>

          <div>
            <label class="label" for="filterStatus">ステータス</label>
            <select id="filterStatus" class="select"></select>
          </div>

          <div>
            <label class="label" for="filterKeyword">キーワード</label>
            <input id="filterKeyword" class="input" type="text" placeholder="名称・場所・責任者・備考など" />
          </div>
        </div>

        <button class="btn blue" onclick="loadKariokiList()">検索</button>
        <button class="btn secondary" onclick="clearFilters()">条件クリア</button>
      </div>

      <div class="card">
        <h2 class="card-title">検索結果 <span id="listCount"></span></h2>
        <div id="kariokiList" class="list"></div>
      </div>
    </section>

    <!-- 詳細画面 -->
    <section id="pageDetail" class="page">
      <div class="top-actions">
        <button class="btn small secondary" onclick="showPage('pageSearch')">← 一覧へ</button>
        <button class="btn small blue" onclick="openEditForm()">編集</button>
      </div>

      <div class="card">
        <h2 class="card-title">仮置き場詳細</h2>
        <div id="detailArea"></div>

        <button class="btn warning" onclick="quickChangeStatus()">ステータス変更</button>
        <button class="btn danger" onclick="deleteCurrentKarioki()">削除</button>
      </div>
    </section>

    <!-- 登録・編集画面 -->
    <section id="pageForm" class="page">
      <div class="top-actions">
        <button class="btn small secondary" onclick="backFromForm()">← 戻る</button>
      </div>

      <div class="card">
        <h2 class="card-title" id="formTitle">仮置き場登録</h2>

        <input id="formKariokiId" type="hidden" />

        <div class="section-title">基本情報</div>

        <div class="form-grid">
          <div>
            <label class="label" for="formBuilding">建屋</label>
            <select id="formBuilding" class="select"></select>
          </div>

          <div>
            <label class="label" for="formFloor">フロア</label>
            <input id="formFloor" class="input" type="text" placeholder="例：2F / 5F" />
          </div>

          <div class="full">
            <label class="label" for="formKariokiName">仮置き場名称</label>
            <input id="formKariokiName" class="input" type="text" placeholder="例：Y5客先1" />
          </div>

          <div>
            <label class="label" for="formCategory">区分</label>
            <select id="formCategory" class="select"></select>
          </div>

          <div>
            <label class="label" for="formCategory2">区分2</label>
            <select id="formCategory2" class="select"></select>
          </div>

          <div>
            <label class="label" for="formMaintenanceType">メンテ区分</label>
            <select id="formMaintenanceType" class="select"></select>
          </div>

          <div>
            <label class="label" for="formStatus">ステータス</label>
            <select id="formStatus" class="select"></select>
          </div>
        </div>

        <div class="section-title">場所・用途</div>

        <label class="label" for="formPurpose">用途</label>
        <input id="formPurpose" class="input" type="text" placeholder="例：使用済みパーツ仮置き" />

        <label class="label" for="formLocationText">場所</label>
        <input id="formLocationText" class="input" type="text" placeholder="例：Y5-2F-南36柱" />

        <label class="label" for="formAreaSize">仮置き場所サイズ</label>
        <input id="formAreaSize" class="input" type="text" placeholder="例：パレット2枚分 / 約2m×3m" />

        <label class="label" for="formNearestRoom">最寄前室</label>
        <input id="formNearestRoom" class="input" type="text" placeholder="例：Y5南前室" />

        <div class="section-title">仮置き期間</div>

        <div class="form-grid">
          <div>
            <label class="label" for="formKariokiStartDate">開始日</label>
            <input id="formKariokiStartDate" class="input" type="date" />
          </div>

          <div>
            <label class="label" for="formKariokiEndDate">終了日</label>
            <input id="formKariokiEndDate" class="input" type="date" />
          </div>
        </div>

        <label class="label" for="formExpireDate">使用期限</label>
        <input id="formExpireDate" class="input" type="date" />

        <div class="section-title">申請・管理情報</div>

        <label class="label" for="formApplicantDeptPhone">申請課電話番号（内線5桁）</label>
        <input id="formApplicantDeptPhone" class="input" type="text" inputmode="numeric" maxlength="5" placeholder="例：12345" />

        <label class="label" for="formManagerDept">管理者所属</label>
        <input id="formManagerDept" class="input" type="text" placeholder="例：TKMサポート" />

        <label class="label" for="formManagerName">管理責任者名</label>
        <input id="formManagerName" class="input" type="text" placeholder="例：若佐" />

        <label class="label" for="formManagerPhone">管理責任者番号（内線5桁）</label>
        <input id="formManagerPhone" class="input" type="text" inputmode="numeric" maxlength="5" placeholder="例：12345" />

        <label class="label" for="formUserName">使用者名</label>
        <input id="formUserName" class="input" type="text" placeholder="例：使用者名" />

        <label class="label" for="formUserPhone">使用者番号（内線5桁）</label>
        <input id="formUserPhone" class="input" type="text" inputmode="numeric" maxlength="5" placeholder="例：12345" />

        <div class="section-title">備考</div>

        <label class="label" for="formNote">備考</label>
        <textarea id="formNote" class="textarea" placeholder="補足事項を入力"></textarea>

        <button class="btn success" onclick="saveKarioki()">保存</button>
      </div>
    </section>

    <!-- シフト確認画面 -->
    <section id="pageShift" class="page">
      <div class="top-actions">
        <button class="btn small secondary" onclick="showPage('pageHome')">← ホーム</button>
        <button class="btn small blue" onclick="loadShiftCalendar()">更新</button>
      </div>

      <div class="shift-header-box">
        <h2 class="shift-title">シフト表</h2>
        <div class="shift-range" id="shiftAvailableRange">
          表示可能期間：読み込み中
        </div>
      </div>

      <div class="card">
        <h2 class="card-title" id="shiftMonthTitle">シフト表</h2>

        <div class="shift-month-nav">
          <button class="btn secondary" onclick="moveShiftMonth(-1)">前へ</button>
          <button class="btn blue" onclick="moveShiftMonth(0)">今月</button>
          <button class="btn secondary" onclick="moveShiftMonth(1)">次へ</button>
        </div>

        <div class="shift-calendar" id="shiftCalendar"></div>
      </div>

      <div class="card">
        <h2 class="card-title">注意シフト一覧</h2>
        <div id="shiftSpecialList" class="shift-special-list"></div>
      </div>
    </section>

    <!-- 操作履歴画面 -->
    <section id="pageLog" class="page">
      <div class="top-actions">
        <button class="btn small secondary" onclick="showPage('pageHome')">← ホーム</button>
      </div>

      <div class="card">
        <h2 class="card-title">操作履歴</h2>
        <button class="btn blue" onclick="loadOperationLog()">最新履歴を取得</button>
      </div>

      <div id="logList"></div>
    </section>

    <footer class="footer">
      System provided by Yoshifumi Wakasa
    </footer>
  </div>

  <script>
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyZCJYCEsEp5bZbCn8ZO1pCH_F844c1OKOYFDgErQWYp3q_ge0XTaTw8UgjRAhWbFjSfQ/exec';

    const state = {
      token: localStorage.getItem('kmt_token') || '',
      user: JSON.parse(localStorage.getItem('kmt_user') || 'null'),
      buildings: [],
      options: {},
      currentList: [],
      currentItem: null,

    window.addEventListener('load', async () => {
      if (state.token && state.user) {
        updateUserBar();
        showPage('pageHome');

        try {

        } catch (error) {
          showError(error.message);
          logout(false);
        }
      } else {
        showPage('pageLogin');
      }
    });

    async function apiRequest(action, payload = {}) {
      if (!GAS_WEB_APP_URL || GAS_WEB_APP_URL.includes('ここにGAS')) {
        throw new Error('GAS_WEB_APP_URL が未設定です。index.html内のURLを設定してください。');
      }

      const sendPayload = { ...payload };

      if (state.token && action !== 'login') {
        sendPayload.token = state.token;
      }

      setLoading(true);

      try {
        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify({
            action: action,
            payload: sendPayload
          })
        });

        const text = await response.text();

        let data;

        try {
          data = JSON.parse(text);
        } catch (error) {
          console.error(text);
          throw new Error('GASからの応答をJSONとして読み取れませんでした。デプロイURLや権限設定を確認してください。');
        }

        if (!data.success) {
          throw new Error(data.message || '処理に失敗しました。');
        }

        return data;

      } catch (error) {
        if (String(error.message).includes('Failed to fetch')) {
          throw new Error('GASに接続できません。Webアプリのデプロイ設定、アクセス権限、URLを確認してください。');
        }

        throw error;

      } finally {
        setLoading(false);
      }
    }

    function setLoading(isLoading) {
      document.getElementById('app').classList.toggle('loading', isLoading);
    }

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(page => {
        page.classList.remove('active');

      window.scrollTo({ top: 0, behavior: 'smooth' });

    async function login() {
      const userId = document.getElementById('loginUserId').value.trim();
      const password = document.getElementById('loginPassword').value.trim();

      if (!userId || !password) {
        showError('ユーザーIDとパスワードを入力してください。');
        return;
      }

      try {
        const result = await apiRequest('login', { userId, password });

        state.token = result.token;
        state.user = result.user;

        localStorage.setItem('kmt_token', state.token);
        localStorage.setItem('kmt_user', JSON.stringify(state.user));

        updateUserBar();

        await loadMasterData();

        showPage('pageHome');
        showSuccess('ログインしました。');

      } catch (error) {
        showError(error.message);
      }
    }

    function logout(showMsg = true) {
      state.token = '';
      state.user = null;
      state.currentItem = null;

      localStorage.removeItem('kmt_token');
      localStorage.removeItem('kmt_user');

      updateUserBar();

    async function saveKarioki() {
      const data = {
        kariokiId: document.getElementById('formKariokiId').value,
        buildingCode: document.getElementById('formBuilding').value,
        floor: document.getElementById('formFloor').value.trim(),
        kariokiName: document.getElementById('formKariokiName').value.trim(),
        category: document.getElementById('formCategory').value,
        category2: document.getElementById('formCategory2').value,
        maintenanceType: document.getElementById('formMaintenanceType').value,
        purpose: document.getElementById('formPurpose').value.trim(),
        locationText: document.getElementById('formLocationText').value.trim(),
        areaSize: document.getElementById('formAreaSize').value.trim(),
        nearestRoom: document.getElementById('formNearestRoom').value.trim(),
        kariokiStartDate: document.getElementById('formKariokiStartDate').value,
        kariokiEndDate: document.getElementById('formKariokiEndDate').value,
        expireDate: document.getElementById('formExpireDate').value,
        applicantDeptPhone: document.getElementById('formApplicantDeptPhone').value.trim(),
        managerDept: document.getElementById('formManagerDept').value.trim(),
        managerName: document.getElementById('formManagerName').value.trim(),
        managerPhone: document.getElementById('formManagerPhone').value.trim(),
        userName: document.getElementById('formUserName').value.trim(),
        userPhone: document.getElementById('formUserPhone').value.trim(),
        status: document.getElementById('formStatus').value,
        note: document.getElementById('formNote').value.trim()
      };

      if (!data.buildingCode) {
        showError('建屋を選択してください。');
        return;
      }

      if (!data.floor) {
        showError('フロアを入力してください。');
        return;
      }

      if (!data.kariokiName) {
        showError('仮置き場名称を入力してください。');
        return;
      }

      if (!isValidExtension(data.applicantDeptPhone)) {
        showError('申請課電話番号は内線5桁で入力してください。');
        return;
      }

      if (!isValidExtension(data.managerPhone)) {
        showError('管理責任者番号は内線5桁で入力してください。');
        return;
      }

      if (!isValidExtension(data.userPhone)) {
        showError('使用者番号は内線5桁で入力してください。');
        return;
      }

      if (data.kariokiStartDate && data.kariokiEndDate && data.kariokiStartDate > data.kariokiEndDate) {
        showError('仮置き期間の終了日は開始日以降にしてください。');
        return;
      }

      try {
        let result;

        if (state.formMode === 'create') {
          result = await apiRequest('createKarioki', { data });
          showSuccess(`登録しました。ID：${result.kariokiId}`);
          await loadKariokiList();
          await openDetail(result.kariokiId);

        } else {
          result = await apiRequest('updateKarioki', { data });
          showSuccess('更新しました。');
          state.currentItem = result.data;
          await loadKariokiList();
          renderDetail();
          showPage('pageDetail');
        }

      } catch (error) {
        showError(error.message);
      }
    }

        showError('対象データがありません。');

      const options = state.options.kariokiStatus || ['使用中', '空き', '一時停止', '廃止'];
      const message = `変更後のステータスを入力してください。\n候補：${options.join(' / ')}`;

    function renderShiftCalendar(data) {
      const monthTitle = document.getElementById('shiftMonthTitle');
      const availableRange = document.getElementById('shiftAvailableRange');
      const calendar = document.getElementById('shiftCalendar');
      const specialList = document.getElementById('shiftSpecialList');

      monthTitle.textContent = data.monthLabel || `${state.shiftYear}年${state.shiftMonth}月`;

      if (data.hasData) {
        availableRange.textContent = `表示可能期間：${formatDateForDisplay(data.availableStartDate)} から ${formatDateForDisplay(data.availableEndDate)} まで`;
      } else {
        availableRange.textContent = '表示可能期間：シフトデータがまだありません';
      }

      calendar.innerHTML = '';

      const weekdays = ['日', '月', '火', '水', '木', '金', '土'];

      weekdays.forEach(day => {
        const div = document.createElement('div');
        div.className = 'shift-weekday';
        div.textContent = day;
        calendar.appendChild(div);
      });

      const days = data.days || [];

      if (days.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'shift-day';
        empty.style.gridColumn = '1 / -1';
        empty.textContent = 'この月のシフトデータはありません。';
        calendar.appendChild(empty);
        specialList.innerHTML = '<div class="shift-special-item">注意シフトはありません。</div>';
        return;
      }

      const firstWeekday = days[0].weekday || 0;

      for (let i = 0; i < firstWeekday; i++) {
        const blank = document.createElement('div');
        blank.className = 'shift-day empty';
        calendar.appendChild(blank);
      }

      days.forEach(day => {
        const div = document.createElement('div');
        div.className = 'shift-day';

        const dateClass = day.weekday === 0 ? 'sunday' : day.weekday === 6 ? 'saturday' : '';

        let html = `<div class="shift-date ${dateClass}">${day.day}</div>`;

        const workers = day.workingMembers || [];

        if (workers.length === 0) {
          html += `<span class="shift-worker">出勤なし</span>`;
        } else {
          workers.forEach(worker => {
            const specialClass = worker.isSpecial === 'TRUE' ? 'special' : '';
            const name = worker.displayName || worker.memberName || '';
            const label = worker.isSpecial === 'TRUE'
              ? `${name} ${worker.shiftType || worker.shiftValue || ''}`
              : name;

            html += `<span class="shift-worker ${specialClass}">${escapeHtml(label)}</span>`;
          });
        }

        div.innerHTML = html;
        calendar.appendChild(div);
      });

      renderShiftSpecialList(data.specialList || []);
    }

    function renderShiftSpecialList(list) {
      const specialList = document.getElementById('shiftSpecialList');

      specialList.innerHTML = '';

      if (!list || list.length === 0) {
        specialList.innerHTML = '<div class="shift-special-item">注意シフトはありません。</div>';
        return;
      }

      list.forEach(item => {
        const div = document.createElement('div');
        div.className = 'shift-special-item';

        const name = item.displayName || item.memberName || '';
        const shiftLabel = item.shiftType || item.shiftValue || '';

        div.innerHTML = `
          <strong>${escapeHtml(formatDateForDisplay(item.date))}　${escapeHtml(name)}　${escapeHtml(shiftLabel)}</strong>
          <div>元データ：${escapeHtml(item.shiftValue || '')}</div>
        `;

        specialList.appendChild(div);
      });
    }

    function moveShiftMonth(offset) {
      if (offset === 0) {
        const now = new Date();
        state.shiftYear = now.getFullYear();
        state.shiftMonth = now.getMonth() + 1;
      } else {
        const date = new Date(state.shiftYear, state.shiftMonth - 1 + offset, 1);
        state.shiftYear = date.getFullYear();
        state.shiftMonth = date.getMonth() + 1;
      }

      loadShiftCalendar();
    }

    function getActivePageId() {
      const active = document.querySelector('.page.active');
      return active ? active.id : 'pageHome';
    }

    function badge(text, type) {
      if (!text) return '';
      return `<span class="badge ${type || ''}">${escapeHtml(text)}</span>`;
    }

    function statusBadge(status) {
      if (!status) return '';

      let type = '';

      if (status === '使用中') type = 'green';
      if (status === '空き') type = 'blue';
      if (status === '一時停止') type = 'orange';
      if (status === '廃止') type = 'red';

      return `<span class="badge ${type}">${escapeHtml(status)}</span>`;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function formatDateForInput(value) {
      if (!value) return '';

      const text = String(value);

      if (/^\d{4}-\d{2}-\d{2}$/.test(text)) {
        return text;
      }

      if (/^\d{4}\/\d{2}\/\d{2}/.test(text)) {
        return text.slice(0, 10).replaceAll('/', '-');
      }

      const date = new Date(value);

      if (isNaN(date.getTime())) {
        return '';
      }

      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');

      return `${y}-${m}-${d}`;
    }

    function formatDateForDisplay(value) {
      if (!value) return '';

      const text = String(value);

      if (/^\d{4}-\d{2}-\d{2}$/.test(text)) {
        return text.replaceAll('-', '/');
      }

      if (/^\d{4}\/\d{2}\/\d{2}/.test(text)) {
        return text.slice(0, 10);
      }

      return text;
    }

    function makePeriodText(startDate, endDate) {
      const start = formatDateForDisplay(startDate);
      const end = formatDateForDisplay(endDate);

      if (start && end) {
        return `${start} 〜 ${end}`;
      }

      if (start && !end) {
        return `${start} 〜`;
      }

      if (!start && end) {
        return `〜 ${end}`;
      }

      return '';
    }

    function isValidExtension(value) {
      const text = String(value || '').trim();

      if (!text) {
        return true;
      }

      return /^\d{5}$/.test(text);
    }
  </script>
</body>
</html>
